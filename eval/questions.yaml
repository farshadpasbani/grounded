# Labelled eval set. ~15-20 of these is what turns "I built RAG" into
# "I evaluated retrieval recall and answer faithfulness". Each item:
#   q:        the question
#   source:   substring that MUST appear in a retrieved chunk's source/heading
#             (recall@k check); omit for an out-of-corpus question
#   answerable: false means the system SHOULD abstain (tests the gate, not recall)
#
# Numeric tuning of GROUNDED_MIN_SCORE against real recall numbers is deferred to
# when real bge embeddings run; this file is the labelled set, not the threshold.

# --- grounded: the service itself ---
- q: "What is grounded?"
  source: "README.md"
  answerable: true

- q: "What embedding model does grounded use?"
  source: "README.md"
  answerable: true

- q: "Which vector database does grounded store chunks in?"
  source: "README.md"
  answerable: true

- q: "Can I run the grounded pipeline without an Anthropic API key?"
  source: "README.md"
  answerable: true

- q: "What does grounded do when retrieval is too weak to answer?"
  source: "README.md"
  answerable: true

- q: "How does grounded keep employer IP out of answers?"
  source: "README.md"
  answerable: true

