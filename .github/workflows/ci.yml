name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Offline test suite: the tests fake embeddings and use the in-memory graph
      # seam (GRAPH_PATH=:memory:), so the light extra is all CI needs — no torch,
      # no kuzu, no Docker, no API key. [dev] pulls pytest; [embed] (torch) and
      # [graph] (kuzu) are deliberately excluded.
      - name: Install
        run: pip install -e '.[dev]'

      - name: Run offline tests
        env:
          PYTHONHASHSEED: "0"
        run: pytest -q
